services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carro_casa}
      POSTGRES_USER: ${POSTGRES_USER:-carro_casa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carro_casa} -d ${POSTGRES_DB:-carro_casa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_HOST_BIND:-127.0.0.1}:${APP_PORT:-3001}:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-carro_casa}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-carro_casa}?schema=public
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
